name: 'Install dbatools.library'
description: 'Installs dbatools.library from PowerShell Gallery or GitHub releases'
inputs:
  version:
    description: 'Version of dbatools.library to install'
    required: true
  shell:
    description: 'Shell to use for psmodulecache (powershell, pwsh, or both)'
    required: false
    default: 'pwsh'

runs:
  using: "composite"
  steps:
    - name: Check module availability
      id: check
      shell: pwsh
      run: |
        $version = '${{ inputs.version }}'
        Write-Host "Checking availability of dbatools.library version: $version"
        
        # Check if it's a preview version
        if ($version -match '-preview-') {
          Write-Host "Preview version detected, will use GitHub releases"
          "source=github-preview" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }
        else {
          try {
            $galleryCheck = Find-Module -Name dbatools.library -RequiredVersion $version -ErrorAction Stop
            Write-Host "✓ Version $version exists in PowerShell Gallery"
            "source=gallery" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          catch {
            Write-Host "Version $version not found in PowerShell Gallery"
            Write-Host "Will check GitHub releases as fallback"
            "source=github-release" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
        }

    - name: Install from PowerShell Gallery
      if: steps.check.outputs.source == 'gallery'
      uses: potatoqualitee/psmodulecache@v6.2.1
      with:
        shell: ${{ inputs.shell }}
        modules-to-cache: dbatools.library:${{ inputs.version }}

    - name: Install from GitHub Releases
      if: steps.check.outputs.source == 'github-preview' || steps.check.outputs.source == 'github-release'
      shell: pwsh
      run: |
        Write-Host "Installing dbatools.library from GitHub releases..."
        $version = '${{ inputs.version }}'
        
        # For preview versions, use the exact tag
        if ($version -match '-preview-') {
          $tag = "v$version"
        }
        else {
          # For regular versions, check if a release exists
          $tag = "v$version"
        }
        
        $downloadUrl = "https://github.com/dataplat/dbatools.library/releases/download/$tag/dbatools.library.zip"
        
        try {
          # Download the release
          $tempPath = Join-Path $env:TEMP "dbatools.library.zip"
          Write-Host "Downloading from: $downloadUrl"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $tempPath -ErrorAction Stop
          
          # Extract to appropriate module path
          $modulePaths = $env:PSModulePath -split [IO.Path]::PathSeparator
          $targetPath = $modulePaths[0]  # Use first path (usually user path)
          
          Write-Host "Extracting to: $targetPath"
          Expand-Archive -Path $tempPath -DestinationPath $targetPath -Force
          
          # Verify installation
          $module = Get-Module -ListAvailable -Name dbatools.library | Where-Object { $_.Version -like "*$version*" -or $_.Path -like "*$version*" }
          if ($module) {
            Write-Host "✓ Successfully installed dbatools.library from GitHub release"
            Write-Host "Installed version: $($module.Version)"
            Write-Host "Module path: $($module.ModuleBase)"
          }
          else {
            throw "Module installation verification failed"
          }
          
          # Clean up
          Remove-Item -Path $tempPath -Force -ErrorAction SilentlyContinue
        }
        catch {
          Write-Error "Failed to install dbatools.library from GitHub releases: $_"
          throw
        }

    - name: Fail if module not found
      if: steps.check.outputs.source == 'not-found'
      shell: pwsh
      run: |
        throw "dbatools.library version ${{ inputs.version }} not found in PowerShell Gallery or GitHub releases"