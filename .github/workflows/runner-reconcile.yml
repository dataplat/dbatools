# The fleet janitor: every 10 minutes (and after each CI run) it deletes spent and
# zombie runner instances, enforces the business-hours standby floor, self-heals
# unregistered instances, and tops capacity up if the event-driven scale-up missed
# anything (re-runs of failed jobs do not emit a "requested" event -- this catches them).
#
# Standby floor: STANDBY_COUNT instances during STANDBY_HOURS (STANDBY_TZ) Mon-Fri,
# zero outside them. All three come from repo variables so tuning needs no code change.
#
# Maintainer boost: when anyone in BOOST_USERS pushes to a branch other than
# development/master, the floor is raised to BOOST_COUNT until BOOST_HOURS have
# passed since their last such push (any hour, any day). runner-boost.yml nudges
# this workflow on those pushes so the boost kicks in without waiting for cron.
#
# Mondays at 07:00 UTC one extra scheduled tick posts month-to-date spend to the
# "CI cost tracker" issue.
name: runner-reconcile

on:
  schedule:
    - cron: "*/10 * * * *"
    - cron: "0 7 * * 1"
  workflow_run:
    workflows: ["ci-azure"]
    types: [completed]
  # ci-azure jobs also nudge this workflow via workflow_dispatch as they finish,
  # so spent VMs are replaced promptly without waiting for the best-effort cron
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write
  id-token: write

concurrency:
  group: runner-fleet
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ secrets.CI_RUNNER_PAT }}
      REPO: ${{ github.repository }}
      RG: ${{ vars.CI_AZURE_RG }}
      VMSS: ${{ vars.CI_VMSS_NAME }}
      MAX_RUNNERS: ${{ vars.MAX_RUNNERS }}
      STANDBY_COUNT: ${{ vars.STANDBY_COUNT }}
      STANDBY_HOURS: ${{ vars.STANDBY_HOURS }}
      STANDBY_TZ: ${{ vars.STANDBY_TZ }}
      BOOST_USERS: ${{ vars.BOOST_USERS }}
      BOOST_COUNT: ${{ vars.BOOST_COUNT }}
      BOOST_HOURS: ${{ vars.BOOST_HOURS }}
      RUNNER_LABEL: dbatools-modern
      RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Reconcile fleet
        run: |
          set -euo pipefail
          NOW=$(date -u +%s)

          # ---- desired floor from business hours -------------------------------
          LOCAL_HOUR=$(TZ="$STANDBY_TZ" date +%H | sed 's/^0//')
          LOCAL_DOW=$(TZ="$STANDBY_TZ" date +%u)
          START_HOUR=$(echo "$STANDBY_HOURS" | cut -d- -f1 | sed 's/^0//')
          END_HOUR=$(echo "$STANDBY_HOURS" | cut -d- -f2 | sed 's/^0//')
          FLOOR=0
          if [ "$LOCAL_DOW" -le 5 ] && [ "$LOCAL_HOUR" -ge "$START_HOUR" ] && [ "$LOCAL_HOUR" -lt "$END_HOUR" ]; then
            FLOOR=$STANDBY_COUNT
          fi

          # ---- maintainer boost: recent feature-branch pushes raise the floor ---
          # (fork pushes do not appear in this repo's event stream, so only pushes
          # to branches on dataplat/dbatools count)
          if [ -n "${BOOST_USERS:-}" ] && [ "${BOOST_COUNT:-0}" -gt "$FLOOR" ]; then
            CUTOFF=$(date -u -d "${BOOST_HOURS:-3} hours ago" +%Y-%m-%dT%H:%M:%SZ)
            EVENTS=$(gh api --paginate "repos/$REPO/events?per_page=100" 2>/dev/null || echo "[]")
            RECENT=$(echo "$EVENTS" | jq -s --arg cutoff "$CUTOFF" --arg users "$BOOST_USERS" \
              '[.[][] | select(.type == "PushEvent" and .created_at > $cutoff
                and (.actor.login | IN($users | split(" ")[]))
                and ((.payload.ref // "") | test("^refs/heads/(development|master)$") | not))] | length')
            if [ "${RECENT:-0}" -gt 0 ]; then
              echo "maintainer boost: $RECENT push(es) to feature branches by [$BOOST_USERS] in the last ${BOOST_HOURS:-3}h -- floor raised to $BOOST_COUNT"
              FLOOR=$BOOST_COUNT
            fi
          fi

          # ---- current state ---------------------------------------------------
          RUNNERS_JSON=$(gh api "repos/$REPO/actions/runners?per_page=100" --paginate \
            --jq "[.runners[] | select([.labels[].name] | index(\"$RUNNER_LABEL\")) | {name, status, busy, id}]")
          VMS_JSON=$(az vm list -g "$RG" --show-details \
            --query "[?starts_with(name, '${VMSS}_')].{name: name, created: timeCreated, power: powerState}" -o json 2>/dev/null || echo "[]")

          QUEUED=$(gh api "repos/$REPO/actions/runs?status=queued&per_page=100" \
            --jq '[.workflow_runs[] | select(.name == "ci-azure")] | length')

          echo "floor=$FLOOR queued_runs=$QUEUED"
          echo "$VMS_JSON" | jq -r '.[] | "vm: \(.name) \(.power) created \(.created)"'
          echo "$RUNNERS_JSON" | jq -r '.[] | "runner: \(.name) \(.status) busy=\(.busy)"'

          # ---- registration helper (also detects and deletes spent VMs) ---------
          curl -fsSL "$RAW_BASE/.github/runners/bootstrap-runner.ps1" -o /tmp/bootstrap-runner.ps1
          register_unregistered() {
            local registered vms vm token
            registered=$(gh api "repos/$REPO/actions/runners?per_page=100" --paginate --jq '[.runners[].name] | join(" ")')
            vms=$(az vm list -g "$RG" --query "[?starts_with(name, '${VMSS}_') && provisioningState == 'Succeeded'].name" -o tsv 2>/dev/null || true)
            for vm in $vms; do
              case " $registered " in
                *" $vm "*) continue ;;
              esac
              echo "registering $vm"
              token=$(gh api -X POST "repos/$REPO/actions/runners/registration-token" --jq .token)
              (
                OUT=$(az vm run-command invoke -g "$RG" -n "$vm" --command-id RunPowerShellScript \
                  --scripts @/tmp/bootstrap-runner.ps1 \
                  --parameters "Token=$token" "RunnerName=$vm" "Labels=$RUNNER_LABEL" \
                  --query "value[0].message" -o tsv || true)
                echo "$OUT" | tail -3
                if echo "$OUT" | grep -q "SPENT-VM"; then
                  echo "$vm already served a job -- deleting instead of reusing"
                  az vm delete -g "$RG" -n "$vm" --yes --no-wait || true
                fi
              ) &
            done
            wait
          }

          # ---- pass 1: try to register BEFORE any deletion decisions ------------
          # (cron delivery is unreliable; a slow-provisioning instance must get its
          # registration attempt before the never-registered rule can reap it)
          register_unregistered

          # refresh state after registration/spent-deletions
          RUNNERS_JSON=$(gh api "repos/$REPO/actions/runners?per_page=100" --paginate \
            --jq "[.runners[] | select([.labels[].name] | index(\"$RUNNER_LABEL\")) | {name, status, busy, id}]")
          VMS_JSON=$(az vm list -g "$RG" --show-details \
            --query "[?starts_with(name, '${VMSS}_')].{name: name, created: timeCreated, power: powerState}" -o json 2>/dev/null || echo "[]")

          # ---- pass 2: delete spent/zombie instances ----------------------------
          KEEP=0
          for VM in $(echo "$VMS_JSON" | jq -r '.[].name'); do
            CREATED=$(echo "$VMS_JSON" | jq -r ".[] | select(.name == \"$VM\") | .created")
            AGE_MIN=$(( (NOW - $(date -u -d "$CREATED" +%s)) / 60 ))
            R_STATUS=$(echo "$RUNNERS_JSON" | jq -r ".[] | select(.name == \"$VM\") | .status")
            R_BUSY=$(echo "$RUNNERS_JSON" | jq -r ".[] | select(.name == \"$VM\") | .busy")
            R_ID=$(echo "$RUNNERS_JSON" | jq -r ".[] | select(.name == \"$VM\") | .id")

            DELETE=""
            if [ "$R_BUSY" = "true" ] && [ "$AGE_MIN" -lt 180 ]; then
              KEEP=$((KEEP + 1)); continue
            fi
            if [ -z "$R_STATUS" ] && [ "$AGE_MIN" -gt 45 ]; then
              DELETE="never registered after ${AGE_MIN}m (registration was attempted this cycle)"
            elif [ "$R_STATUS" = "offline" ] && [ "$AGE_MIN" -gt 15 ]; then
              # bootstrap reboots into the interactive session; fresh instances are
              # briefly offline between config and the post-reboot logon
              DELETE="runner offline (spent ephemeral or dead)"
            elif [ "$AGE_MIN" -gt 180 ]; then
              DELETE="zombie: age ${AGE_MIN}m"
            fi

            if [ -n "$DELETE" ]; then
              echo "deleting $VM -- $DELETE"
              [ -n "$R_ID" ] && gh api -X DELETE "repos/$REPO/actions/runners/$R_ID" || true
              az vm delete -g "$RG" -n "$VM" --yes --no-wait || true
            else
              KEEP=$((KEEP + 1))
            fi
          done

          # ---- pass 3: top up to floor / demand ----------------------------------
          BUSY=$(echo "$RUNNERS_JSON" | jq '[.[] | select(.busy == true)] | length')
          DESIRED=$(( BUSY + QUEUED ))
          [ "$DESIRED" -lt "$FLOOR" ] && DESIRED=$FLOOR
          [ "$DESIRED" -gt "$MAX_RUNNERS" ] && DESIRED=$MAX_RUNNERS
          echo "keep=$KEEP desired=$DESIRED"
          if [ "$KEEP" -lt "$DESIRED" ]; then
            az vmss scale -g "$RG" -n "$VMSS" --new-capacity "$DESIRED" --no-wait || true
            echo "waiting for new instances to provision"
            sleep 150
            register_unregistered
          fi

          # ---- pass 3b: trim surplus idle instances (oldest first) ---------------
          if [ "$KEEP" -gt "$DESIRED" ]; then
            TRIM=$(( KEEP - DESIRED ))
            echo "trimming $TRIM surplus idle instance(s)"
            for VM in $(echo "$VMS_JSON" | jq -r 'sort_by(.created) | .[].name'); do
              [ "$TRIM" -le 0 ] && break
              R_BUSY=$(echo "$RUNNERS_JSON" | jq -r ".[] | select(.name == \"$VM\") | .busy")
              [ "$R_BUSY" = "true" ] && continue
              az vm show -g "$RG" -n "$VM" --query name -o tsv >/dev/null 2>&1 || continue
              R_ID=$(echo "$RUNNERS_JSON" | jq -r ".[] | select(.name == \"$VM\") | .id")
              echo "trim: deleting idle $VM"
              [ -n "$R_ID" ] && gh api -X DELETE "repos/$REPO/actions/runners/$R_ID" || true
              az vm delete -g "$RG" -n "$VM" --yes --no-wait || true
              TRIM=$(( TRIM - 1 ))
            done
          fi

          # ---- pass 4: drop runner records with no matching VM -----------------
          VMS_NOW=$(az vm list -g "$RG" --query "[?starts_with(name, '${VMSS}_')].name" -o tsv 2>/dev/null | tr '\n' ' ' || true)
          for R_NAME in $(echo "$RUNNERS_JSON" | jq -r '.[] | select(.busy != true) | .name'); do
            case " $VMS_NOW " in
              *" $R_NAME "*) continue ;;
            esac
            R_ID=$(echo "$RUNNERS_JSON" | jq -r ".[] | select(.name == \"$R_NAME\") | .id")
            echo "removing stale runner record $R_NAME"
            gh api -X DELETE "repos/$REPO/actions/runners/$R_ID" || true
          done

  spend-report:
    if: github.event.schedule == '0 7 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.CI_RUNNER_PAT }}
      REPO: ${{ github.repository }}
      RG: ${{ vars.CI_AZURE_RG }}
    permissions:
      issues: write
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Post month-to-date spend
        run: |
          set -euo pipefail
          SUB=$(az account show --query id -o tsv)
          FROM=$(date -u +%Y-%m-01)
          TO=$(date -u +%Y-%m-%d)
          BODY=$(az rest --method post \
            --uri "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.CostManagement/query?api-version=2023-11-01" \
            --body "{\"type\": \"ActualCost\", \"timeframe\": \"Custom\", \"timePeriod\": {\"from\": \"$FROM\", \"to\": \"$TO\"}, \"dataset\": {\"granularity\": \"None\", \"aggregation\": {\"totalCost\": {\"name\": \"Cost\", \"function\": \"Sum\"}}}}" \
            --query "properties.rows[0][0]" -o tsv 2>/dev/null || echo "unavailable")
          COST=$(printf "%.2f" "$BODY" 2>/dev/null || echo "$BODY")
          ISSUE=$(gh issue list -R "$REPO" --search "CI cost tracker in:title" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE" ]; then
            ISSUE=$(gh issue create -R "$REPO" --title "CI cost tracker" \
              --body "Automated month-to-date Azure spend for the self-hosted runner fleet." \
              | grep -o '[0-9]*$')
          fi
          gh issue comment "$ISSUE" -R "$REPO" --body "Month-to-date spend for \`$RG\` as of $TO: **\$$COST**"
