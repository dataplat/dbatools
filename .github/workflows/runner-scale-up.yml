# Manual recovery entry point for the same idempotent pool controller used by
# runner-reconcile. Keeping one implementation prevents recovery and normal scaling
# from making conflicting capacity decisions.
name: runner-scale-up

on:
  workflow_dispatch:
    inputs:
      boost_user:
        description: "Actor whose pool should be heated immediately"
        required: false
        default: ""
      boost_message:
        description: "Head commit message used to evaluate the runner activation marker"
        required: false
        default: ""
      boost_sha:
        description: "Head commit SHA used to deduplicate marked CI dispatches"
        required: false
        default: ""
      boost_ref:
        description: "Branch ref used when dispatching marked CI"
        required: false
        default: ""

permissions:
  contents: read
  actions: write
  id-token: write

concurrency:
  group: runner-fleet
  cancel-in-progress: false

jobs:
  scale-up:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.CI_RUNNER_PAT }}
      REPO: ${{ github.repository }}
      RG: ${{ vars.CI_AZURE_RG }}
      VMSS: ${{ vars.CI_VMSS_NAME }}
      MAX_RUNNERS: 35
      COMMUNITY_COUNT: 5
      COMMUNITY_GRACE_MINUTES: 20
      BOOST_USERS: potatoqualitee andreasjordan niphlod
      BOOST_COUNT: 10
      BOOST_HOURS: 1
      OPT_IN_PUSH_USERS: potatoqualitee
      CI_MARKER: "[do ci]"
      BOOST_TRIGGER: ${{ inputs.boost_user }}
      BOOST_MESSAGE: ${{ inputs.boost_message }}
      BOOST_SHA: ${{ inputs.boost_sha }}
      BOOST_REF: ${{ inputs.boost_ref }}
      WORKFLOW_TOKEN: ${{ github.token }}
      RUNNER_LABEL: dbatools-modern
      RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}
      POLICY_PATH: /tmp/runner-policy.ps1
      BOOTSTRAP_PATH: /tmp/bootstrap-runner.ps1
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Download fleet controller
        id: controller
        run: |
          set -euo pipefail
          echo "ready=false" >> "$GITHUB_OUTPUT"
          if ! curl --retry 3 --retry-all-errors --retry-delay 3 -fsSL \
              "$RAW_BASE/.github/runners/reconcile-runner-fleet.ps1" \
              -o /tmp/reconcile-runner-fleet.ps1; then
            echo "::warning::Fleet controller download exhausted retries; run recovery again after the transient clears."
            exit 0
          fi
          if ! curl --retry 3 --retry-all-errors --retry-delay 3 -fsSL \
              "$RAW_BASE/.github/runners/runner-policy.ps1" \
              -o "$POLICY_PATH"; then
            echo "::warning::Runner policy download exhausted retries; run recovery again after the transient clears."
            exit 0
          fi
          if ! curl --retry 3 --retry-all-errors --retry-delay 3 -fsSL \
              "$RAW_BASE/.github/runners/bootstrap-runner.ps1" \
              -o "$BOOTSTRAP_PATH"; then
            echo "::warning::Runner bootstrap download exhausted retries; run recovery again after the transient clears."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Reconcile AppVeyor-style pools
        if: steps.controller.outputs.ready == 'true'
        shell: pwsh
        run: /tmp/reconcile-runner-fleet.ps1
