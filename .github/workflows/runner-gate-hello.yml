# Phase 0 Gate B: proves an ephemeral self-hosted runner on the legacy Server 2012
# golden image can pick up and complete a job. Deliberately uses ONLY run: steps --
# node20-based actions (checkout, etc.) will not start on Server 2012, so any job
# that must stay portable to the legacy pool has to remain action-free.
#
# Dispatch: gh workflow run runner-gate-hello.yml --ref <branch> -R dataplat/dbatools
name: runner-gate-hello

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hello:
    runs-on: [self-hosted, scratch-2012]
    timeout-minutes: 15
    steps:
      - name: Report runner environment
        shell: powershell
        run: |
          "PSVersion : $($PSVersionTable.PSVersion)"
          "CLR       : $($PSVersionTable.CLRVersion)"
          "Computer  : $env:COMPUTERNAME"
          "User      : $env:USERNAME"
          (Get-WmiObject -Class Win32_OperatingSystem).Caption

      - name: Git clone via run step (no node-based actions)
        continue-on-error: true
        shell: powershell
        run: |
          git --version
          git clone --depth 1 --branch $env:GITHUB_REF_NAME https://github.com/$env:GITHUB_REPOSITORY.git "$env:RUNNER_TEMP\repo-clone"
          "clone exit: $LASTEXITCODE"
          Get-ChildItem -Path "$env:RUNNER_TEMP\repo-clone" | Select-Object -First 5 -ExpandProperty Name
