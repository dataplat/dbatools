# Nightly PowerShell 3.0 coverage, runnerless: boots a throwaway VM from the legacy
# Server 2012 golden image (native PS 3.0, five SQL instances), drives
# tests/ps3-smoke.ps1 through the Azure guest agent, and deletes the VM. No GitHub
# runner is ever installed on the 2012 box for this -- the ubuntu job IS the runner.
#
# Pester 6 requires PS 5.1+, so this plain script is what PS 3.0 coverage looks like.
# It fails loudly: any [FAIL] line or a nonzero summary fails the workflow.
name: ps3-smoke

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ps3-smoke
  cancel-in-progress: false

env:
  RG: ${{ vars.CI_AZURE_RG }}
  LEGACY_IMAGE: /subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/DBATOOLS-CI-IMAGES/providers/Microsoft.Compute/galleries/dbatoolsGallery/images/dbatools-golden-image/versions/1.0.0
  RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}
  ZIP_BASE: https://codeload.github.com/${{ github.repository }}/zip/refs/heads/${{ github.ref_name }}

jobs:
  ps3-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Boot legacy VM, run smoke, tear down
        run: |
          set -euo pipefail
          VM="ps3smoke-${{ github.run_number }}"
          PASS="Db$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 16)!5k"

          cleanup() {
            echo "== cleanup"
            az vm delete -g "$RG" -n "$VM" --yes || true
            az network nic delete -g "$RG" -n "${VM}VMNic" || true
            az network public-ip delete -g "$RG" -n "${VM}PublicIP" || true
          }
          trap cleanup EXIT

          echo "== creating $VM from the legacy 2012 image (ephemeral OS disk)"
          az vm create -g "$RG" -n "$VM" \
            --image "$LEGACY_IMAGE" \
            --size Standard_D4ds_v5 \
            --admin-username dbatools --admin-password "$PASS" \
            --nsg "" --public-ip-sku Standard \
            --ephemeral-os-disk true --ephemeral-os-disk-placement ResourceDisk \
            --os-disk-caching ReadOnly \
            --output none

          echo "== fetching smoke script"
          curl -fsSL "$RAW_BASE/tests/ps3-smoke.ps1" -o /tmp/ps3-smoke.ps1

          echo "== running smoke (all instances)"
          OUTPUT=$(az vm run-command invoke -g "$RG" -n "$VM" \
            --command-id RunPowerShellScript \
            --scripts @/tmp/ps3-smoke.ps1 \
            --parameters "RepoZipUrl=$ZIP_BASE" \
            --query "value[0].message" -o tsv)

          echo "$OUTPUT"
          {
            echo "## ps3-smoke ($(date -u +%F))"
            echo '```'
            echo "$OUTPUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if echo "$OUTPUT" | grep -q "\[SUMMARY\] pass=[0-9]* fail=0"; then
            echo "smoke green"
          else
            echo "::error::ps3-smoke failed -- see summary"
            exit 1
          fi
