name: Cross Platform Import
on: 
  push:
  workflow_dispatch:
    inputs:
      dbatools-library-version:
        description: 'Override dbatools.library version (e.g., 2024.5.1-preview)'
        required: false
        type: string

jobs:
  build:
    env:
      SMODefaultModuleName: dbatools
    name: Module imports on all platforms
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest, macOS-14]

    steps:
    - uses: actions/checkout@v3

    - name: Read dbatools.library version
      id: version
      shell: pwsh
      run: |
        if ('${{ github.event.inputs.dbatools-library-version }}') {
          $version = '${{ github.event.inputs.dbatools-library-version }}'
          Write-Host "Using workflow input version: $version"
        } else {
          $config = Get-Content ./.github/dbatools-library-version.json | ConvertFrom-Json
          $version = $config.version
          Write-Host "Using config file version: $version"
        }
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Install dbatools.library
      uses: ./.github/actions/install-dbatools-library
      with:
          version: ${{ steps.version.outputs.version }}

    - name: Perform the import
      shell: pwsh
      run: |
        Import-Module ./dbatools.psd1 -ErrorAction Stop
        (Get-DbaManagementObject).LoadTemplate -ne $null